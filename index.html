<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked fetch overwrite attempt'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // If it's not configurable, we can't do much, but at least we tried
          console.warn('Fetch guard could not be established:', e.message);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
